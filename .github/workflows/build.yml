name: Build Bombchu Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install devkitPro pacman
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils
        wget https://apt.devkitpro.org/install-devkitpro-pacman
        sudo bash install-devkitpro-pacman

    - name: Install devkitPPC + libogc
      run: |
        sudo dkp-pacman -S --noconfirm devkitPPC libogc

    - name: Set DEVKITPPC environment variable
      run: echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> $GITHUB_ENV

    - name: Build project
      run: make

    - name: Upload DOL artifact
      uses: actions/upload-artifact@v4
      with:
        name: bombchu.dol
        path: bombchu.dol

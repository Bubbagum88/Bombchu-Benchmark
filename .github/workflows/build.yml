name: Build Bombchu Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build project
      run: make

    - name: Upload DOL artifact
      uses: actions/upload-artifact@v4
      with:
        name: bombchu
        path: bombchu.dol

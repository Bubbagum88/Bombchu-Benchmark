name: Build Bombchu Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install devkitPPC
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils
        wget https://github.com/devkitPro/pacman/releases/download/devkitpro-pacman-1.0.3/devkitpro-pacman.deb
        sudo dpkg -i devkitpro-pacman.deb
        sudo dkp-pacman -S --noconfirm devkitPPC libogc

    - name: Set DEVKITPPC
      run: echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> \

    - name: Build project
      run: make

    - name: Upload DOL artifact
      uses: actions/upload-artifact@v3
      with:
        name: bombchu.dol
        path: bombchu.dol

name: Debug Toolchain

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Print environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITPPC=$DEVKITPPC"
          ls -R /opt/devkitpro || true

      - name: Find libogc
        run: |
          find /opt/devkitpro -name gccore.h || true
          find /opt/devkitpro -maxdepth 5 -type d | grep -i ogc || true
